<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Simulador EFAI Nivel 3</title><style>
body{margin:0;font-family:Arial;background:#f2f4f8;color:#111}.top{background:linear-gradient(135deg,#0f172a,#0f766e);color:white;padding:18px}main{padding:14px;max-width:900px;margin:auto}.card{background:white;border-radius:18px;padding:18px;margin:14px 0;box-shadow:0 4px 18px #0002}.btn{background:#0f766e;color:white;border:0;border-radius:12px;padding:13px 18px;font-weight:bold;font-size:16px}.btn2{background:#555}.timer{font-size:30px;font-weight:bold;background:#fff0c2;color:#8a4b00;border-radius:12px;padding:9px 14px;display:inline-block}.q{border-top:1px solid #ddd;padding:16px 0}.q:first-child{border-top:0}.opt{display:block;border:2px solid #ddd;border-radius:12px;padding:12px;margin:8px 0}.opt.sel{border-color:#0f766e;background:#ecfdf5}.stop{text-align:center;background:#b91c1c;color:white}.stop h1{font-size:55px}.hide{display:none}.bar{height:10px;background:#ddd;border-radius:99px;overflow:hidden}.bar div{height:100%;background:#0f766e;width:0}.fig{font-size:54px;letter-spacing:12px;background:#f8fafc;border:1px solid #ddd;border-radius:12px;padding:15px;text-align:center}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}@media(max-width:600px){.grid{grid-template-columns:1fr}}</style></head><body>
<div class="top"><h2>Simulador EFAI Nivel 3</h2><small>Práctica no oficial · versión 1</small></div>
<main>
<section id="inicio" class="card">
<h1>Simulación tipo examen</h1>
<p>Bloque E: Figuras · 6 minutos<br>Bloque N: Numérico · 14 minutos<br>Bloque R: Razonamiento · 12 minutos</p>
<button class="btn" onclick="start()">COMENZAR</button>
</section>
<section id="exam" class="hide">
<div class="card"><h2 id="titulo"></h2><div class="timer" id="timer">00:00</div><p id="cont"></p><div class="bar"><div id="barra"></div></div></div>
<div class="card" id="preguntas"></div>
<div class="card"><button class="btn" onclick="finBloque()">Terminar bloque</button></div>
</section>
<section id="stop" class="card stop hide"><h1>STOP</h1><p id="stoptext">Bloque terminado</p><button class="btn" onclick="sig()">CONTINUAR</button></section>
<section id="res" class="card hide"></section>
</main>
<script>
const bloques=[
{t:"Bloque E · Figuras",m:6,p:Array.from({length:30},(_,i)=>{let figs=["▲","■","◆","●","★","⬟","⬢","✚","✦","⬤"];let a=i%4,correct=["A","B","C","D"][a];return{q:"Identifica la opción que mantiene el mismo patrón visual.",fig:figs[i%10]+" "+figs[(i+2)%10]+" ? ",o:{A:figs[(i+a)%10],B:figs[(i+a+1)%10],C:figs[(i+a+2)%10],D:figs[(i+a+3)%10]},r:correct,type:"fig"}})},
{t:"Bloque N · Numérico",m:14,p:[
["¿Cuál es mayor?",["12÷6","3³","28−23","√16"],"B"],["4 árboles dan 10 frutos por semana. En 2 semanas dan:",["20","40","80","100"],"C"],["80 sube 25%. Nuevo precio:",["90","95","100","105"],"C"],["Promedio de 12,15,18,19:",["15","16","17","18"],"B"],["Área de 9m x 6m:",["15","30","54","60"],"C"],["40 con 15% descuento:",["34","35","36","38"],"A"],["3/5 de un número es 24. Número:",["30","36","40","45"],"C"],["180 litros menos 30%:",["54","90","126","150"],"C"],["125 + IVA 15%:",["137.50","140.75","143.75","150"],"C"],["7m cuestan 28. 11m cuestan:",["38","40","44","48"],"C"],["6² + 4² =",["40","48","52","60"],"C"],["Doble de un número menos 6 es 24:",["12","15","18","20"],"B"],["40% de 250:",["80","90","100","110"],"C"],["9 cajas pesan 63kg. 14 pesan:",["84","91","98","105"],"C"],["120 km en 2h:",["40","50","60","80"],"C"],["35 hojas en 5 días:",["5","7","14","35"],"B"],["18+9−(3×2):",["18","21","23","27"],"B"],["5 cuadernos cuestan 7.50, 8 cuestan:",["10","11","12","13"],"C"],["Perímetro 94, largo 32. Ancho:",["12","15","17","19"],"B"],["3/4 tanque en 30 min. Completo:",["35","40","45","50"],"B"],["Exporta 140 e importa 260. Diferencia:",["80","100","120","140"],"C"],["Producto 180, desc.10%, IVA15%:",["162","178.20","186.30","207"],"C"],["15 defectos son 5%. Producción:",["150","200","250","300"],"D"],["45 piezas/hora en 4.5h:",["180","190","202.5","210"],"C"],["Un número +35=92:",["47","52","57","62"],"C"],["2.5×15 vs 10×2³ vs 20%250:",["37.5","80","50","25"],"B"],["24 tornillos, se usan 3/8. Quedan:",["9","12","15","18"],"C"],["Luis tenía 30 y gastó 2/3 de lo que quedó:",["10","12","15","20"],"B"],["6 obreros en 8 días. 12 obreros:",["2","4","6","16"],"B"],["Máquina 4 km en 50min. En 100min:",["6","7","8","10"],"C"],["Mayor: 15.5+9.8 / 30−4.9",["25.3","25.1","24.65","24.5"],"A"],["8L cada 100km. En 250km:",["16","18","20","22"],"C"],["Si A=12 y B=3, A×B+4:",["36","40","42","48"],"B"],["Raíz de 81 + 7:",["14","15","16","17"],"C"],["50% de 90 menos 10:",["30","35","40","45"],"B"]].map((x,i)=>({q:x[0],o:{A:x[1][0],B:x[1][1],C:x[1][2],D:x[1][3]},r:x[2]}))},
{t:"Bloque R · Razonamiento",m:12,p:[
["2,4,8,16,...",["18","24","30","32"],"D"],["5,9,14,20,...",["25","27","28","30"],"B"],["Moneda es a hucha como llave es a:",["metal","cerradura","puerta","maestra"],"B"],["Persona puntual llega:",["tarde","nerviosa","a su hora","antes"],"C"],["A,C,F,J,O,...",["S","T","U","V"],"C"],["No pertenece:",["martillo","destornillador","alicate","manzana"],"D"],["Perro ladra, gato:",["corre","maúlla","vuela","ruge"],"B"],["3,6,11,18,27,...",["36","38","40","42"],"B"],["Caliente/frío, alto/...",["grande","bajo","largo","subir"],"B"],["1,1,2,3,5,8,...",["10","11","13","15"],"C"],["4,7,11,16,22,...",["27","28","29","30"],"C"],["Libro/leer, lápiz/...",["borrar","escribir","pintura","papel"],"B"],["Médico/hospital, maestro/...",["escuela","libro","pizarra","alumno"],"A"],["Z,X,U,Q,L,...",["F","G","H","I"],"A"],["Pedro>Luis>Carlos:",["Carlos mayor","Pedro mayor","Luis menor","No se sabe"],"B"],["Ojo/ver, oído/...",["hablar","oler","escuchar","tocar"],"C"],["No pertenece:",["rojo","azul","verde","mesa"],"D"],["10,20,18,36,34,...",["64","66","68","70"],"C"],["Avión/cielo, barco/...",["carretera","mar","aire","tierra"],"B"],["Niño, adulto, niño, adulto,...",["niño","adulto","mujer","hombre"],"A"],["Pequeño/grande, corto/...",["bajo","alto","largo","delgado"],"C"],["100,90,81,73,66,...",["60","59","58","57"],"A"],["Mesa/madera, ventana/...",["vidrio","silla","casa","puerta"],"A"],["Opuesto de rápido:",["veloz","lento","pronto","ágil"],"B"],["A>B y B>C:",["C>A","A>C","A=C","No se sabe"],"B"],["Semilla/planta, huevo/...",["gallina","nido","cáscara","comida"],"A"],["2,6,12,20,30,...",["38","40","42","44"],"C"],["Hielo se derrite con:",["frío","calor","ruido","viento"],"B"],["7,14,12,24,22,...",["40","42","44","46"],"C"],["Oscuro es a claro como triste es a:",["alto","alegre","frío","rápido"],"B"],["No pertenece:",["enero","marzo","lunes","junio"],"C"],["María antes que José, José antes que Ana:",["Ana","José","María","No se sabe"],"C"],["Todos A son B. Ningún B es C:",["Algún A es C","Ningún A es C","Todo C es A","No se sabe"],"B"],["Casa/techo, libro/...",["hoja","pared","mesa","puerta"],"A"],["Si mañana es viernes, hoy es:",["miércoles","jueves","viernes","sábado"],"B"]].map((x,i)=>({q:x[0],o:{A:x[1][0],B:x[1][1],C:x[1][2],D:x[1][3]},r:x[2]}))}
];
let b=0,ans={},time=0,total=0,int=null;
function start(){document.getElementById("inicio").classList.add("hide");document.getElementById("exam").classList.remove("hide");load()}
function load(){clearInterval(int);let bl=bloques[b];time=bl.m*60;total=time;document.getElementById("titulo").textContent=bl.t;render();tick();int=setInterval(tick,1000)}
function render(){let bl=bloques[b],h="";document.getElementById("cont").textContent=bl.p.length+" preguntas";bl.p.forEach((q,i)=>{h+=`<div class=q><b>${bl.t[7]}${i+1}</b><p>${q.q}</p>`+(q.type?`<div class=fig>${q.fig}</div>`:"")+`<div class=grid>`;["A","B","C","D"].forEach(L=>h+=`<label class="opt" onclick="sel('${bl.t[7]}${i}', '${L}', this)"><input type=radio name="${bl.t[7]}${i}"> <b>${L}</b> ${q.o[L]}</label>`);h+="</div></div>"});document.getElementById("preguntas").innerHTML=h}
function sel(id,L,el){ans[id]=L;[...document.getElementsByName(id)].forEach(x=>x.parentElement.classList.remove("sel"));el.classList.add("sel")}
function tick(){let m=Math.floor(time/60),s=time%60;document.getElementById("timer").textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");document.getElementById("barra").style.width=(100*(1-time/total))+"%";if(time<=0){finBloque();return}time--}
function finBloque(){clearInterval(int);document.getElementById("exam").classList.add("hide");if(b<bloques.length-1){document.getElementById("stop").classList.remove("hide")}else resultados()}
function sig(){document.getElementById("stop").classList.add("hide");document.getElementById("exam").classList.remove("hide");b++;load()}
function resultados(){let html="<h1>Resultados</h1>",tc=0,tt=0;bloques.forEach(bl=>{let c=0;bl.p.forEach((q,i)=>{let id=bl.t[7]+i;if(ans[id]===q.r)c++});tc+=c;tt+=bl.p.length;html+=`<p><b>${bl.t}</b>: ${c}/${bl.p.length}</p>`});let pct=Math.round(tc/tt*100);html+=`<h2>Total: ${tc}/${tt} (${pct}%)</h2><p><b>Nivel:</b> ${pct>=80?"Muy preparado":pct>=65?"Buen nivel":pct>=50?"Necesita práctica":"Practicar más"}</p><button class=btn onclick="location.reload()">Repetir</button>`;document.getElementById("res").innerHTML=html;document.getElementById("res").classList.remove("hide")}
</script></body></html>
