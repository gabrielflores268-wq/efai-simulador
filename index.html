<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simulador EFAI Nivel 3</title><link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1>Simulador EFAI Nivel 3</h1><p>Versión 5 · relojes psicotécnicos</p></header>
<main>
<section id="inicio" class="card">
<h2>Simulación tipo examen</h2>
<p>Incluye figuras, relojes psicotécnicos, numérico y razonamiento. Al final recrea tus respuestas y te deja practicar solo los errores.</p>
<button onclick="iniciar(true)">Comenzar examen</button>
<button class="sec" onclick="iniciar(false)">Práctica sin tiempo</button>
<button class="warn" onclick="practicarErrores()">Practicar mis errores</button>
<div id="historial"></div>
</section>
<section id="examen" class="hide">
<div class="card"><h2 id="titulo"></h2><div id="timer">00:00</div><div class="barra"><div id="barra"></div></div><p id="avance"></p></div>
<div id="pregunta" class="card"></div>
</section>
<section id="stop" class="card stop hide"><h1>STOP</h1><p>Bloque terminado.</p><button onclick="siguienteBloque()">Continuar</button></section>
<section id="resultados" class="card hide"></section>
</main>
<script src="preguntas.js"></script><script src="script.js"></script>
</body></html>
